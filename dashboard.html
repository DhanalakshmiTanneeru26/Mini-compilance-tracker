{% extends 'base.html' %}
{% block content %}

<h2>Dashboard</h2>

<div class="row">
<div class="col-md-3"><div class="card p-3 text-center"><h5>Total</h5><h2>{{ total }}</h2></div></div>
<div class="col-md-3"><div class="card p-3 text-center"><h5>Pending</h5><h2>{{ pending }}</h2></div></div>
<div class="col-md-3"><div class="card p-3 text-center"><h5>Completed</h5><h2>{{ completed }}</h2></div></div>
<div class="col-md-3"><div class="card p-3 text-center"><h5>Overdue</h5><h2>{{ overdue }}</h2></div></div>
</div>

{% endblock %}
